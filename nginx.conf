server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/css application/javascript application/json font/woff2 font/woff;
    gzip_min_length 1000;

    # CORS Headers for cross-domain usage
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;

    # Immutable caching for versioned directories (e.g. /dist/v2025.04/)
    location ~ "^/dist/v[0-9]{4}\.[0-9]{2}/" {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri $uri/ =404;
    }

    # Short caching for the /latest/ symlink or current active pointer
    location ^~ /dist/latest/ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri $uri/ =404;
    }

    # Font caching
    location ~* \.(woff2|woff|ttf)$ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # General static file routing
    location / {
        try_files $uri $uri/ =404;
    }

    # Handle OPTIONS requests for preflight
    if ($request_method = 'OPTIONS') {
        return 204;
    }
}
